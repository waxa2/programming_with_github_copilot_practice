<!DOCTYPE html>
<html>
    <head>
        <title>Create Profile</title>
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css" rel="stylesheet">
    </head>
    <body class="font-sans bg-gray-200 m-0 p-0">
        <div class="text-center text-3xl font-bold text-gray-800 mt-12 mb-6">Create Profile</div>
        <form class="max-w-sm mx-auto bg-white p-5 rounded-lg shadow-md">
            <label for="name" class="block mb-2 text-gray-800">Name:</label>
            <input type="text" id="name" name="name" required class="w-full p-2 border border-gray-300 rounded mb-4">
            <label for="email" class="block mb-2 text-gray-800">Email:</label>
            <input type="email" id="email" name="email" required class="w-full p-2 border border-gray-300 rounded mb-4">
            <label for="password" class="block mb-2 text-gray-800">Password:</label>
            <input type="password" id="password" name="password" required class="w-full p-2 border border-gray-300 rounded mb-4">
            <button type="submit" class="bg-green-500 text-white p-2 px-5 rounded cursor-pointer">Create Profile</button>
        </form>
    </body>
</html>
