<!DOCTYPE html>
<html>

    <head>
        <title>Create Profile</title>
    </head>

    <body style="font-family: Arial, sans-serif; 
                background-color: #f2f2f2; 
                margin: 0; 
                padding: 0;">
        <div 
        style="text-align: center; 
        font-size: 36px;
        font-weight: bold;
        color: #333; 
        margin-top: 50px;
        margin-bottom: 25px;">Create Profile</div>

        <form
            style="max-width: 400px;
            margin: 0 auto; 
            background-color: #fff; 
            padding: 20px; 
            border-radius: 5px; 
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);">
            <label for="name" style="display: block; 
            margin-bottom: 10px; 
            color: #333;">Name:</label>

            <input type="text" id="name" name="name" required
                style="width: 100%; 
                padding: 10px; 
                border: 1px solid #ccc; 
                border-radius: 3px; 
                margin-bottom: 20px;">

            <label for="email" 
            style="display: block; 
            margin-bottom: 10px; 
            color: #333;">Email:</label>
            
            <input type="email" id="email" name="email" required
                style="width: 100%; 
                padding: 10px; 
                border: 1px solid #ccc; 
                border-radius: 3px; 
                margin-bottom: 20px;">

            <label for="password" 
            style="display: block; 
            margin-bottom: 10px; 
            color: #333;">Password:</label>

            <input type="password" id="password" name="password" required
                style="width: 100%; 
                padding: 10px; 
                border: 1px solid #ccc; 
                border-radius: 3px; 
                margin-bottom: 20px;">

            <button type="submit"
                style="background-color: #4CAF50; 
                color: #fff; 
                padding: 10px 20px; 
                border: none; 
                border-radius: 3px; 
                cursor: pointer;">
                Create Profile</button>
        </form>
    </body>
</html>
